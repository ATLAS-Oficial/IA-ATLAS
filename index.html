<!DOCTYPE html>
<html lang="es">
<head>
  <title>Sandwich IA — Tienda de Sabores Arequito</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0d0d0d;
      --surface:     #111111;
      --border:      #2a2a2a;
      --border-soft: #1e1e1e;
      --accent:      #ffffff;
      --accent-soft: #1a1a1a;
      --text:        #f0f0f0;
      --text-mid:    #aaaaaa;
      --text-light:  #555555;
      --user-bg:     #161616;
      --ia-bg:       #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    .brand-name {
      font-family: 'Libre Baskerville', serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .brand-name span {
      color: #ffffff;
    }

    .brand-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      align-self: center;
    }

    .brand-sub {
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-light);
      font-weight: 300;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #888888;
    }

    /* ── CHAT AREA ── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── WELCOME ── */
    .welcome-block {
      max-width: 600px;
      margin-bottom: 40px;
      animation: fade-in 0.4s ease both;
    }

    .welcome-block .wb-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    .welcome-block h2 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.35rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .welcome-block p {
      font-size: 0.875rem;
      color: var(--text-mid);
      line-height: 1.75;
    }

    .suggestion-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 7px 14px;
      font-size: 0.78rem;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text-mid);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .suggestion-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── MESSAGES ── */
    .msg-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border-soft);
      animation: fade-in 0.3s ease both;
    }

    .msg-block:last-child { border-bottom: none; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .msg-sender {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .msg-sender.ia { color: #ffffff; }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-light);
      font-weight: 300;
    }

    .msg-body {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
      max-width: 680px;
      padding-left: 0;
    }

    .msg-body.user-body {
      color: var(--text-mid);
    }

    /* Markdown */
    .msg-body strong { font-weight: 500; color: var(--text); }
    .msg-body em     { font-style: italic; color: var(--text-mid); }
    .msg-body code {
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 5px;
      font-size: 0.83em;
      font-family: 'IBM Plex Mono', monospace;
    }
    .msg-body ul, .msg-body ol {
      padding-left: 1.3em;
      margin: 8px 0;
    }
    .msg-body li { margin: 5px 0; }

    /* Copy */
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 10px;
      font-size: 0.68rem;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text-light);
      cursor: pointer;
      margin-top: 12px;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Error */
    .msg-body.error-body {
      color: #888888;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* ── TYPING ── */
    .typing-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 20px 0;
      animation: fade-in 0.3s ease both;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 20px;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      animation: type-pulse 1.1s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes type-pulse {
      0%, 60%, 100% { background: var(--border); transform: scale(1); }
      30%            { background: #ffffff; transform: scale(1.3); }
    }

    /* ── INPUT ZONE ── */
    #input-zone {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 20px 40px 24px;
      flex-shrink: 0;
      z-index: 10;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      max-width: 800px;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 11px 14px;
      outline: none;
      resize: none;
      max-height: 130px;
      line-height: 1.55;
      transition: border-color 0.15s;
    }

    #user-input::placeholder { color: var(--text-light); }

    #user-input:focus { border-color: var(--text-mid); }

    #send-btn {
      background: var(--text);
      color: var(--surface);
      border: none;
      border-radius: 3px;
      padding: 10px 20px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      height: 42px;
    }

    #send-btn:hover:not(:disabled) { background: #ffffff; color: #000000; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      max-width: 800px;
    }

    .input-hint span {
      font-size: 0.68rem;
      color: var(--text-light);
      font-weight: 300;
    }

    /* ── ANIMATIONS ── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header        { padding: 0 20px; }
      #chat-container { padding: 24px 20px; }
      #input-zone   { padding: 16px 20px 20px; }
      .suggestion-grid { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="brand-name">Sandwich<span>.</span>IA</div>
      <div class="brand-divider"></div>
      <div class="brand-sub">Tienda de Sabores Arequito</div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      Asistente en línea
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat-container">
    <div class="welcome-block">
      <div class="wb-label">Asistente Comercial</div>
      <h2>Buenos días. ¿En qué puedo ayudarte hoy?</h2>
      <p>Consultame sobre productos, condiciones mayoristas, logística o cualquier otro tema relacionado con la empresa.</p>
      <div class="suggestion-grid">
        <button class="suggestion-btn" onclick="usarSugerencia(this)">¿Qué productos tienen disponibles?</button>
        <button class="suggestion-btn" onclick="usarSugerencia(this)">Información sobre distribución</button>
        <button class="suggestion-btn" onclick="usarSugerencia(this)">Condiciones mayoristas</button>
        <button class="suggestion-btn" onclick="usarSugerencia(this)">Datos de contacto</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-zone">
    <div class="input-row">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Escribí tu consulta…"
        autocomplete="off"
        spellcheck="true"
        maxlength="2000"
      ></textarea>
      <button id="send-btn" onclick="enviarMensaje()">Enviar</button>
    </div>
    <div class="input-hint">
      <span>Enter para enviar · Shift+Enter para nueva línea</span>
      <span id="char-count">0 / 2000</span>
    </div>
  </div>

<script>
  const SYSTEM_PROMPT = `Sos el asistente virtual oficial de **Tienda de Sabores Arequito**, una empresa mayorista de alimentos ubicada en Arequito, Santa Fe, Argentina.

Tu personalidad:
- Amigable, directo y profesional. Hablás en español rioplatense natural (tuteo, voseo).
- Respondés con precisión y sin rodeos. Si no sabés algo, lo decís honestamente.
- Nunca inventás datos de stock, precios o disponibilidad. Si no tenés esa info en tiempo real, explicás cómo obtenerla.

Lo que podés hacer:
- Responder preguntas generales sobre la empresa, sus productos y servicios.
- Orientar sobre procesos de compra mayorista, logística y distribución.
- Ayudar con consultas de clientes, proveedores o distribuidores.
- Responder preguntas generales de cualquier tipo con buena onda y claridad.

Información base de la empresa:
- Razón social: Tienda de Sabores Arequito
- Rubro: Distribución y venta mayorista de alimentos y productos de almacén
- Ubicación: Arequito, Santa Fe, Argentina
- Canal: Mayorista / distribución regional

Importante: Si te preguntan algo que está fuera de tu conocimiento o necesita confirmación de datos en tiempo real (stock exacto, precios del día), decilo claramente y sugerí que contacten directamente al equipo comercial.

Respondé siempre en español rioplatense. Sé conciso pero completo. Usá formato limpio cuando sea útil (listas, negrita para resaltar info clave).`;

  let historial = [];
  let esperando = false;

  const chatContainer = document.getElementById('chat-container');
  const inputEl       = document.getElementById('user-input');
  const sendBtn       = document.getElementById('send-btn');
  const charCount     = document.getElementById('char-count');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
    charCount.textContent = `${inputEl.value.length} / 2000`;
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviarMensaje();
    }
  });

  function usarSugerencia(el) {
    inputEl.value = el.textContent.trim();
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  }

  function ahora() {
    return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`([^`]+)`/g,     '<code>$1</code>')
      .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
      .replace(/^[-•] (.+)$/gm,  '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
      .replace(/\n/g, '<br>');
  }

  function agregarMensaje(rol, contenido, esError = false) {
    const block = document.createElement('div');
    block.className = 'msg-block';

    const meta = document.createElement('div');
    meta.className = 'msg-meta';

    const sender = document.createElement('span');
    sender.className = `msg-sender ${rol === 'ia' ? 'ia' : ''}`;
    sender.textContent = rol === 'ia' ? 'Asistente' : 'Vos';

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = ahora();

    meta.appendChild(sender);
    meta.appendChild(time);

    const body = document.createElement('div');
    body.className = `msg-body${rol === 'user' ? ' user-body' : ''}${esError ? ' error-body' : ''}`;

    if (esError) {
      body.innerHTML = `<span>⚠</span><span>${renderMarkdown(contenido)}</span>`;
    } else if (rol === 'ia') {
      body.innerHTML = renderMarkdown(contenido);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copiar respuesta';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(contenido).then(() => {
          copyBtn.textContent = 'Copiado';
          setTimeout(() => copyBtn.textContent = 'Copiar respuesta', 2000);
        });
      };
      block.appendChild(meta);
      block.appendChild(body);
      block.appendChild(copyBtn);
      chatContainer.appendChild(block);
      scrollAbajo();
      return body;
    } else {
      body.textContent = contenido;
    }

    block.appendChild(meta);
    block.appendChild(body);
    chatContainer.appendChild(block);
    scrollAbajo();
    return body;
  }

  let typingBlock = null;

  function mostrarTyping() {
    typingBlock = document.createElement('div');
    typingBlock.className = 'typing-block';

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const sender = document.createElement('span');
    sender.className = 'msg-sender ia';
    sender.textContent = 'Asistente';
    meta.appendChild(sender);

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    typingBlock.appendChild(meta);
    typingBlock.appendChild(dots);
    chatContainer.appendChild(typingBlock);
    scrollAbajo();
  }

  function ocultarTyping() {
    if (typingBlock) { typingBlock.remove(); typingBlock = null; }
  }

  function scrollAbajo() {
    requestAnimationFrame(() => { chatContainer.scrollTop = chatContainer.scrollHeight; });
  }

  async function enviarMensaje() {
    const texto = inputEl.value.trim();
    if (!texto || esperando) return;

    esperando = true;
    sendBtn.disabled = true;

    agregarMensaje('user', texto);
    historial.push({ role: 'user', content: texto });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    charCount.textContent = '0 / 2000';

    mostrarTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: historial
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const contenidoIA = data.content?.[0]?.text || '(Sin respuesta)';
      historial.push({ role: 'assistant', content: contenidoIA });

      ocultarTyping();
      agregarMensaje('ia', contenidoIA);

    } catch (err) {
      ocultarTyping();
      const msg = err.message?.includes('fetch')
        ? 'No se pudo conectar con el servidor. Verificá tu conexión e intentá nuevamente.'
        : `Error al procesar la consulta: ${err.message}`;
      agregarMensaje('ia', msg, true);
      historial.pop();
    } finally {
      esperando = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
