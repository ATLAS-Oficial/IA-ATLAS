<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual</title>
    <style>
        /* ==========================================================================
           1. ESTILOS BASE (NEGRO ABSOLUTO Y MINIMALISMO)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .chat-fullscreen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* ==========================================================================
           2. ENCABEZADO
           ========================================================================== */
        .chat-header {
            background-color: #000000;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111111;
        }

        .chat-title {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .chat-status {
            color: #888888;
            font-size: 13px;
        }

        /* ==========================================================================
           3. PANEL DE CONVERSACIÓN
           ========================================================================== */
        .chat-body {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background-color: #222222;
        }

        .log-row {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.1s ease-out;
        }

        .log-row.bot {
            align-self: flex-start;
        }

        .log-row.user {
            align-self: flex-end;
            text-align: right;
        }

        .sender-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .bot .sender-tag { color: #666666; }
        .user .sender-tag { color: #3b82f6; }

        .message-text {
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .bot .message-text {
            color: #ffffff;
            border-left: 2px solid #222222;
            padding-left: 16px;
        }

        .user .message-text {
            color: #e0e0e0;
            border-right: 2px solid #3b82f6;
            padding-right: 16px;
        }

        .timestamp {
            font-size: 11px;
            color: #444444;
            margin-top: 6px;
        }

        /* ==========================================================================
           4. ÁREA DE ENTRADA DE TEXTO
           ========================================================================== */
        .chat-footer {
            background-color: #000000;
            padding: 40px;
            border-top: 1px solid #111111;
        }

        .input-line {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 20px;
        }

        .input-line input {
            flex: 1;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-line input::placeholder {
            color: #444444;
        }

        .terminal-btn {
            background-color: transparent;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 12px 28px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .terminal-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="chat-fullscreen">
        <div class="chat-header">
            <div class="chat-title">Asistente Virtual</div>
            <div class="chat-status" id="sessionStatus">Sesión activa</div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="log-row bot">
                <span class="sender-tag">Asistente</span>
                <div class="message-text">Hola. ¿En qué te puedo ayudar hoy?</div>
                <span class="timestamp" id="initTime">00:00</span>
            </div>
        </div>

        <div class="chat-footer">
            <form class="input-line" id="chatForm">
                <input type="text" id="userInput" placeholder="Escribí tu mensaje acá..." autocomplete="off" required autofocus>
                <button type="submit" class="terminal-btn">ENVIAR</button>
            </form>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const chatBody = document.getElementById('chatBody');

        // Respuestas locales fijas
        const RESPUESTAS_LOCALES = {
            "hola": [
                "Hola. Decime en qué te puedo ayudar.",
                "Hola. Quedo a tu disposición para lo que necesités.",
                "Hola. ¿Cómo va?"
            ],
            "como estas": [
                "Todo bien por acá. ¿Y vos?",
                "Muy bien. ¿En qué te puedo colaborar?",
                "Todo en orden. ¿Vos cómo estás?"
            ],
            "bien": [
                "Me alegra escuchar eso. ¿Cómo te llamás?",
                "Qué bueno. Decime tu nombre para continuar.",
                "Excelente. ¿Cuál es tu nombre?"
            ],
            "benja": [
                "Perfecto, Benja. Si necesitás asistencia con algo, avisame.",
                "Hola, Benja. Decime en qué te puedo dar una mano.",
                "Entendido, Benja. Quedo a tu disposición para lo que haga falta."
            ],
            "chau": [
                "Chau. Nos vemos.",
                "Hasta luego. Que andes bien.",
                "Chau. Cuidate."
            ]
        };

        function getTimestamp() {
            const now = new Date();
            return now.toTimeString().split(' ')[0].slice(0, 5);
        }

        document.getElementById('initTime').innerText = getTimestamp();

        function appendMessage(sender, text, role) {
            const logRow = document.createElement('div');
            logRow.className = `log-row ${role}`;

            logRow.innerHTML = `
                <span class="sender-tag">${sender}</span>
                <div class="message-text">${text}</div>
                <span class="timestamp">${getTimestamp()}</span>
            `;

            chatBody.appendChild(logRow);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        /* TU FUNCIÓN DE BÚSQUEDA EN WIKIPEDIA
          (Corregida y adaptada para integrarse al flujo del chat)
        */
        async function buscarEnWikipedia(consulta) {
            try {
                const r = await fetch(`https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(consulta)}&format=json&origin=*`);
                const d = await r.json();
                if (!d.query.search.length) return null;
                
                const titulo = d.query.search[0].title;
                const [eR, iR] = await Promise.all([
                    fetch(`https://es.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=1&explaintext=1&titles=${encodeURIComponent(titulo)}&format=json&origin=*`).then(r=>r.json()),
                    fetch(`https://es.wikipedia.org/w/api.php?action=query&prop=pageimages&pithumbsize=400&titles=${encodeURIComponent(titulo)}&format=json&origin=*`).then(r=>r.json())
                ]);
                
                const pid = Object.keys(eR.query.pages)[0];
                if (eR.query.pages[pid].missing) return null;
                
                let img = ''; 
                const ip = iR.query.pages[pid]; 
                if (ip && ip.thumbnail) img = ip.thumbnail.source;
                
                return { extract: eR.query.pages[pid].extract, title: titulo, imageUrl: img };
            } catch(e) { 
                return null; 
            }
        }

        /*
          MANEJADOR DEL FORMULARIO
        */
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const message = userInput.value;
            if (!message.trim()) return;

            // 1. Pintamos el mensaje del operador en pantalla
            appendMessage('Vos', message, 'user');
            userInput.value = '';

            const cleanMessage = message.toLowerCase().trim();

            // CASO A: Si coincide con las respuestas fijas configuradas localmente
            if (RESPUESTAS_LOCALES[cleanMessage]) {
                const opciones = RESPUESTAS_LOCALES[cleanMessage];
                const index = Math.floor(Math.random() * opciones.length);
                
                setTimeout(() => {
                    appendMessage('Asistente', opciones[index], 'bot');
                }, 400);
            } 
            // CASO B: Si no coincide con nada, disparamos tu buscador de Wikipedia
            else {
                // Ejecutamos tu función asincrónica esperando el objeto de datos
                const info = await buscarEnWikipedia(message);

                if (info) {
                    // Armamos la respuesta seria usando el título y el extracto que programaste
                    let respuestaHTML = `<strong>${info.title}</strong>\n\n${info.extract}`;
                    
                    // Si Wikipedia nos devolvió una imagen válida, la inyectamos abajo del texto con estilos limpios
                    if (info.imageUrl) {
                        respuestaHTML += `<img src="${info.imageUrl}" style="max-width: 100%; height: auto; margin-top: 15px; border-radius: 4px; display: block;">`;
                    }
                    
                    appendMessage('Asistente', respuestaHTML, 'bot');
                } else {
                    // Si tu función atrapó un error o no encontró el artículo, responde esto:
                    appendMessage('Asistente', "No encontré información relevante sobre ese tema.", 'bot');
                }
            }
        });
    </script>
</body>
</html>
