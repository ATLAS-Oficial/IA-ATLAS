<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chatbot • Liquid Glass Neutro</title>
  <style>
    /* ===== VARIABLES GLOBALES (TEMA OSCURO POR DEFECTO, PURO NEGRO) ===== */
    :root {
      --bg-deep: #0a0a0a;
      --bg-elevated: #141414;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b0b0;
      --glass-bg-user: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 50%, rgba(0, 0, 0, 0.6) 100%);
      --glass-bg-bot: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0.7) 100%);
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --glass-border-user: 1px solid rgba(255, 255, 255, 0.15);
      --glass-border-bot: 1px solid rgba(255, 255, 255, 0.1);
      --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06), inset 0 -1px 2px rgba(0, 0, 0, 0.6), 0 10px 30px -10px rgba(0, 0, 0, 0.8);
      --hover-glow: rgba(255, 255, 255, 0.08);
      --specular-color: rgba(255, 255, 255, 0.5);
      --input-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(0, 0, 0, 0.4) 100%);
      --input-focus-border: rgba(255, 255, 255, 0.5);
      --placeholder-color: rgba(255, 255, 255, 0.3);
      --sidebar-header-gradient: linear-gradient(135deg, #ffffffcc, #ffffff44);
      --sidebar-item-bg: rgba(255, 255, 255, 0.03);
      --sidebar-item-hover: rgba(255, 255, 255, 0.1);
      --send-btn-bg: rgba(255, 255, 255, 0.1);
      --send-btn-hover: rgba(255, 255, 255, 0.25);
    }

    /* ===== TEMA GRIS ===== */
    [data-theme="gray"] {
      --bg-deep: #808080;
      --bg-elevated: #8c8c8c;
      --text-primary: #222;
      --text-secondary: #444;
      --glass-bg-user: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0.3) 100%);
      --glass-bg-bot: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 50%, rgba(0, 0, 0, 0.4) 100%);
      --glass-border: 1px solid rgba(255, 255, 255, 0.2);
      --glass-border-user: 1px solid rgba(255, 255, 255, 0.35);
      --glass-border-bot: 1px solid rgba(255, 255, 255, 0.25);
      --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), inset 0 -1px 2px rgba(0, 0, 0, 0.4), 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --hover-glow: rgba(255, 255, 255, 0.25);
      --specular-color: rgba(255, 255, 255, 0.7);
      --input-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(0, 0, 0, 0.3) 100%);
      --input-focus-border: rgba(255, 255, 255, 0.8);
      --placeholder-color: rgba(0, 0, 0, 0.3);
      --sidebar-header-gradient: linear-gradient(135deg, #333, #666);
      --sidebar-item-bg: rgba(255, 255, 255, 0.1);
      --sidebar-item-hover: rgba(255, 255, 255, 0.2);
      --send-btn-bg: rgba(255, 255, 255, 0.2);
      --send-btn-hover: rgba(255, 255, 255, 0.4);
    }

    /* ===== TEMA BLANCO ===== */
    [data-theme="light"] {
      --bg-deep: #ffffff;
      --bg-elevated: #f5f5f5;
      --text-primary: #111;
      --text-secondary: #555;
      --glass-bg-user: linear-gradient(135deg, rgba(0, 0, 0, 0.06) 0%, rgba(255, 255, 255, 0.8) 50%, rgba(200, 200, 200, 0.5) 100%);
      --glass-bg-bot: linear-gradient(135deg, rgba(0, 0, 0, 0.04) 0%, rgba(255, 255, 255, 0.9) 50%, rgba(220, 220, 220, 0.5) 100%);
      --glass-border: 1px solid rgba(0, 0, 0, 0.08);
      --glass-border-user: 1px solid rgba(0, 0, 0, 0.12);
      --glass-border-bot: 1px solid rgba(0, 0, 0, 0.1);
      --glass-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.9), inset 0 -1px 2px rgba(0, 0, 0, 0.05), 0 8px 20px -10px rgba(0, 0, 0, 0.1);
      --hover-glow: rgba(0, 0, 0, 0.05);
      --specular-color: rgba(0, 0, 0, 0.15);
      --input-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.8) 100%);
      --input-focus-border: rgba(0, 0, 0, 0.4);
      --placeholder-color: rgba(0, 0, 0, 0.25);
      --sidebar-header-gradient: linear-gradient(135deg, #222, #555);
      --sidebar-item-bg: rgba(0, 0, 0, 0.03);
      --sidebar-item-hover: rgba(0, 0, 0, 0.08);
      --send-btn-bg: rgba(0, 0, 0, 0.06);
      --send-btn-hover: rgba(0, 0, 0, 0.15);
    }

    /* ===== RESET Y BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px, 80px 80px;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .chat-app {
      display: flex;
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 800px;
      background: transparent;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 60px -20px rgba(0, 0, 0, 0.5);
      transition: box-shadow 0.4s;
    }

    .bg-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.4s;
    }

    [data-theme="light"] .bg-pattern {
      background-image: 
        radial-gradient(circle at 30% 50%, rgba(0, 0, 0, 0.02) 0%, transparent 50%),
        radial-gradient(circle at 70% 20%, rgba(0, 0, 0, 0.01) 0%, transparent 40%);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 40%, rgba(0, 0, 0, 0.25) 100%);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-right: var(--glass-border);
      box-shadow: var(--glass-shadow);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 2;
      position: relative;
      border-radius: 28px 4px 28px 4px / 18px 28px 18px 28px;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.4s, box-shadow 0.4s;
    }

    .sidebar-header {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: var(--sidebar-header-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header::before {
      content: "⚙️";
      font-size: 1.6rem;
      -webkit-text-fill-color: initial;
      background: none;
    }

    .theme-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .theme-btn {
      padding: 12px 16px;
      border-radius: 18px 6px 18px 6px / 12px 20px 12px 20px;
      background: var(--sidebar-item-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      font-size: 0.95rem;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .theme-btn:hover {
      background: var(--sidebar-item-hover);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px var(--hover-glow), 0 8px 20px -10px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }

    .theme-btn.active {
      background: var(--sidebar-item-hover);
      border-color: var(--input-focus-border);
      box-shadow: 0 0 15px var(--hover-glow);
      font-weight: 600;
    }

    /* ===== ÁREA PRINCIPAL ===== */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: transparent;
      position: relative;
      z-index: 1;
    }

    .main-header {
      padding: 18px 24px;
      border-bottom: var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(11, 15, 25, 0.4);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 3;
      transition: background 0.4s;
    }

    [data-theme="light"] .main-header {
      background: rgba(255, 255, 255, 0.7);
    }
    [data-theme="gray"] .main-header {
      background: rgba(255, 255, 255, 0.2);
    }

    .main-header h2 {
      font-size: 1.2rem;
      background: linear-gradient(to right, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    [data-theme="light"] .main-header h2 {
      background: linear-gradient(to right, #222, #555);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    [data-theme="gray"] .main-header h2 {
      background: linear-gradient(to right, #333, #666);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: transparent;
      position: relative;
    }

    .messages-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== BURBUJAS ===== */
    .message {
      display: flex;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 75%;
      padding: 14px 20px;
      font-size: 0.95rem;
      line-height: 1.45;
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--glass-bg-user);
      border: var(--glass-border-user);
      border-radius: 28px 28px 8px 28px / 24px 24px 18px 24px;
    }

    .message.bot .bubble {
      background: var(--glass-bg-bot);
      border: var(--glass-border-bot);
      border-radius: 28px 28px 28px 8px / 24px 24px 24px 18px;
    }

    .bubble::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 5%;
      width: 40%;
      height: 2px;
      background: linear-gradient(to right, var(--specular-color), transparent);
      border-radius: 100%;
      opacity: 0.6;
      transition: opacity 0.3s, width 0.3s;
    }

    .bubble:hover {
      transform: translateY(-2px);
      box-shadow: 
        inset 0 1px 2px rgba(255,255,255,0.2),
        inset 0 -2px 6px rgba(0,0,0,0.5),
        0 15px 25px -12px rgba(0,0,0,0.7),
        0 0 20px var(--hover-glow);
    }

    .bubble:hover::before {
      width: 60%;
      opacity: 0.9;
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    [data-theme="light"] .bubble::after {
      background: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.05) 0%, transparent 60%);
    }

    .bubble:hover::after {
      opacity: 1;
    }

    /* ===== INDICADOR DE "PENSANDO..." ===== */
    .thinking-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ===== INPUT ===== */
    .input-area {
      padding: 16px 20px;
      border-top: var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(11, 15, 25, 0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 3;
      transition: background 0.4s;
    }

    [data-theme="light"] .input-area {
      background: rgba(255, 255, 255, 0.5);
    }
    [data-theme="gray"] .input-area {
      background: rgba(255, 255, 255, 0.2);
    }

    .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      background: var(--input-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 8px 8px 20px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 4px 12px rgba(0,0,0,0.4);
      border-radius: 40px 14px 40px 14px / 30px 40px 30px 40px;
    }

    .input-wrapper:focus-within {
      border-color: var(--input-focus-border);
      box-shadow: 
        inset 0 1px 2px rgba(255,255,255,0.2),
        0 0 25px var(--input-focus-border),
        0 8px 20px rgba(0,0,0,0.6);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.03) 50%, rgba(0, 0, 0, 0.4) 100%);
      transform: scale(1.01);
    }

    [data-theme="light"] .input-wrapper:focus-within {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0.8) 50%, rgba(200, 200, 200, 0.5) 100%);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 1rem;
      padding: 8px 0;
      caret-color: #888;
      letter-spacing: 0.2px;
    }

    .input-wrapper input::placeholder {
      color: var(--placeholder-color);
      font-style: italic;
    }

    .send-btn {
      background: var(--send-btn-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40% 60% 60% 40% / 45% 45% 55% 55%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      color: var(--text-primary);
      font-size: 1.3rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .send-btn:hover {
      background: var(--send-btn-hover);
      border-color: var(--input-focus-border);
      box-shadow: 0 0 20px var(--input-focus-border), 0 6px 14px rgba(0,0,0,0.6);
      transform: scale(1.08) rotate(5deg);
    }

    [data-theme="light"] .send-btn {
      color: #222;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* ===== TOGGLE MÓVIL ===== */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 10;
      padding: 8px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .chat-app {
        flex-direction: column;
        border-radius: 24px;
        height: 100vh;
        max-height: 100vh;
        margin: 0;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 280px;
        transform: translateX(-110%);
        border-radius: 0 20px 20px 0 / 0 30px 30px 0;
        z-index: 20;
        box-shadow: 10px 0 40px rgba(0,0,0,0.8);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .menu-toggle {
        display: block;
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 25;
        backdrop-filter: blur(8px);
        background: rgba(11, 15, 25, 0.6);
        border-radius: 16px;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .main-header {
        padding-left: 60px;
      }

      .input-area {
        padding: 12px 16px;
      }

      .bubble {
        max-width: 85%;
      }
    }

    /* Scrollbar neutra */
    .messages-container::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar {
      width: 5px;
    }

    .messages-container::-webkit-scrollbar-track,
    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(128, 128, 128, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="chat-app" data-theme="dark">
    <div class="bg-pattern" aria-hidden="true"></div>

    <button class="menu-toggle" id="menuToggle" aria-label="Abrir configuraciones">☰</button>

    <!-- Sidebar de configuraciones -->
    <aside class="sidebar" id="sidebar" role="complementary" aria-label="Configuraciones">
      <div class="sidebar-header">Configuraciones</div>
      <div class="theme-options">
        <button class="theme-btn active" data-theme="dark">🌙 Negro</button>
        <button class="theme-btn" data-theme="gray">☁️ Gris</button>
        <button class="theme-btn" data-theme="light">☀️ Blanco</button>
      </div>
    </aside>

    <main class="main-area">
      <header class="main-header">
        <h2>Asistente Líquido</h2>
      </header>

      <div class="messages-container" id="messagesContainer" role="log" aria-live="polite" aria-label="Mensajes"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="Escribe un mensaje..." 
            aria-label="Mensaje de chat"
            autocomplete="off"
          >
        </div>
        <button class="send-btn" id="sendButton" aria-label="Enviar mensaje">↗</button>
      </div>
    </main>
  </div>

  <script>
    (() => {
      const app = document.querySelector('.chat-app');
      const msgContainer = document.getElementById('messagesContainer');
      const msgInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendButton');
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.getElementById('menuToggle');
      const themeBtns = document.querySelectorAll('.theme-btn');

      // ----- Base de respuestas locales -----
      const RESPUESTAS_LOCALES = {
        "hola": [
          "¡Hola! ¿En qué puedo ayudarte?",
          "Hola, ¿cómo estás?",
          "¡Hola! Soy tu asistente líquido."
        ],
        "como estas": [
          "Estoy muy bien, gracias por preguntar.",
          "Funcionando correctamente, ¿y tú?",
          "Todo en orden, listo para ayudarte."
        ],
        "adios": [
          "¡Hasta luego!",
          "Nos vemos, vuelve cuando quieras.",
          "Chao, que tengas buen día."
        ],
        "gracias": [
          "De nada, para eso estoy.",
          "¡Con gusto!",
          "No hay de qué."
        ],
        "default": [
          "Interesante, cuéntame más.",
          "No tengo una respuesta para eso, pero puedo aprender.",
          "Entendido, ¿algo más en lo que pueda ayudar?",
          "Déjame pensar mejor en eso..."
        ]
      };

      // Buscar respuesta según el mensaje
      function obtenerRespuesta(texto) {
        const textoLimpio = texto.toLowerCase().trim();
        for (const [clave, respuestas] of Object.entries(RESPUESTAS_LOCALES)) {
          if (clave === 'default') continue;
          if (textoLimpio.includes(clave)) {
            // devuelve una respuesta aleatoria de esa categoría
            return respuestas[Math.floor(Math.random() * respuestas.length)];
          }
        }
        // si no coincide, respuesta por defecto aleatoria
        const defaults = RESPUESTAS_LOCALES.default;
        return defaults[Math.floor(Math.random() * defaults.length)];
      }

      // Temas
      function setTheme(t) {
        app.setAttribute('data-theme', t);
        localStorage.setItem('chat-theme', t);
        themeBtns.forEach(b => b.classList.toggle('active', b.dataset.theme === t));
      }
      const saved = localStorage.getItem('chat-theme') || 'dark';
      setTheme(saved);
      themeBtns.forEach(b => b.addEventListener('click', () => setTheme(b.dataset.theme)));

      // Chat
      function addMsg(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        div.appendChild(bubble);
        msgContainer.appendChild(div);
        scrollDown();
      }

      function showThinking() {
        const div = document.createElement('div');
        div.className = 'message bot thinking';
        const bubble = document.createElement('div');
        bubble.className = 'bubble thinking-bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        div.appendChild(bubble);
        msgContainer.appendChild(div);
        scrollDown();
        return div;
      }

      function scrollDown() {
        msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
      }

      // Inicio: bienvenida
      msgContainer.innerHTML = '';
      addMsg('¡Hola! Soy tu asistente con vidrio líquido. ¿En qué puedo ayudarte?', 'bot');

      // Enviar mensaje
      sendBtn.addEventListener('click', () => {
        const text = msgInput.value.trim();
        if (!text) return;
        addMsg(text, 'user');
        msgInput.value = '';

        // Mostrar "pensando..." y luego responder
        const thinking = showThinking();
        setTimeout(() => {
          thinking.remove();
          const respuesta = obtenerRespuesta(text);
          addMsg(respuesta, 'bot');
        }, 2000);
      });

      msgInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendBtn.click();
        }
      });

      // Menú móvil
      menuBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        menuBtn.setAttribute('aria-expanded', sidebar.classList.contains('open'));
      });
      document.addEventListener('click', e => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !menuBtn.contains(e.target) && sidebar.classList.contains('open')) {
          sidebar.classList.remove('open');
          menuBtn.setAttribute('aria-expanded', 'false');
        }
      });
      menuBtn.setAttribute('aria-expanded', 'false');
      msgInput.focus();
    })();
  </script>
</body>
</html>
